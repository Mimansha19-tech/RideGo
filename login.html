<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>RideGo - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Same CSS as Signup */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: url('https://images.unsplash.com/photo-1587474260584-136574528ed5?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
        }

        .auth-card {
            position: relative;
            background: #fff;
            width: 350px;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #000;
            color: #f8c200;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .link-text {
            margin-top: 20px;
            font-size: 13px;
        }

        #otp-section {
            display: none;
        }
    </style>
</head>

<body>
    <div class="overlay"></div>
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p>Login to continue your ride</p>

        <div id="phone-section">
            <input type="tel" id="phoneNumber" value="+91 " placeholder="+91 Phone Number">
            <div id="recaptcha-container"></div>
            <button class="btn-primary" onclick="sendOTP()">Send OTP</button>
            <div class="link-text">New user? <a href="signup.html">Create Account</a></div>
        </div>

        <div id="otp-section">
            <input type="number" id="otpInput" placeholder="Enter OTP">
            <button class="btn-primary" onclick="verifyOTP()">Verify</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 🔴 PASTE SAME CONFIG HERE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "123456",
            appId: "1:123456:web:abc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        auth.languageCode = 'en';

        window.initRecaptcha = function () {
            if (!window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'normal' });
                window.recaptchaVerifier.render();
            }
        }

        window.sendOTP = function () {
            const phone = document.getElementById("phoneNumber").value;
            initRecaptcha();
            const appVerifier = window.recaptchaVerifier;

            signInWithPhoneNumber(auth, phone, appVerifier)
                .then((confirmationResult) => {
                    window.confirmationResult = confirmationResult;
                    document.getElementById("phone-section").style.display = "none";
                    document.getElementById("otp-section").style.display = "block";
                }).catch((error) => { alert("Error: " + error.message); });
        }

        window.verifyOTP = function () {
            const code = document.getElementById("otpInput").value;
            window.confirmationResult.confirm(code).then((result) => {
                window.location.href = "ride.html";
            }).catch((error) => { alert("Invalid OTP"); });
        }
    </script>
</body>

</html>
